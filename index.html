<html>
<meta charset="UTF-8"></meta>
<meta charset="utf-8"></meta>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0" name="viewport"></meta>
<title>MR. ANAND-TREADER Authorized Panel</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    overflow: hidden;
    background: #000000;
    height: 100vh;
    width: 100vw;
    position: relative;
}

/* BACKGROUND GAME IFRAME */
#gameFrame {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    z-index: 1;
}

/* MAIN MOD PANEL INTERFACE */
#hackBox {
    position: absolute;
    top: 50px;
    left: 20px;
    width: 220px;
    background: #000000;
    border: 2px solid #00ff66;
    box-shadow: 0 0 30px rgba(0, 255, 102, 0.5);
    z-index: 99999;
    border-radius: 14px;
    overflow: hidden;
    display: block; /* Direct visible */
}

.header {
    background: #050a07;
    padding: 10px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: move;
    border-bottom: 2px solid #00ff66;
}

.logoArea {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
}

.logoArea img {
    width: 28px;
    height: 28px;
    border: 1.5px solid #00ff66;
    border-radius: 50%;
    object-fit: cover;
}

/* Spinning Animation Link CSS */
.spin-active {
    animation: logoRotation 1.2s infinite linear !important;
}

@keyframes logoRotation {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.logoArea span {
    color: #ffffff;
    font-size: 12px;
    font-weight: bold;
    font-family: monospace;
}

.closeBtn {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    background: none;
    border: 1px solid #ff3333;
    color: #ff3333;
    font-size: 11px;
    font-weight: bold;
    cursor: pointer;
}

.main { display: flex; }

.sidebar {
    width: 46px;
    border-right: 1px solid #111;
    background: #040806;
    padding: 12px 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}

.sideBtn {
    width: 34px;
    height: 36px;
    background: #000;
    border: 1px solid #00ff66;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 15px;
    color: #00ff66;
    cursor: pointer;
    border-radius: 6px;
}
.sideBtn:hover { color: #000; background: #00ff66; }

.content { flex: 1; padding: 10px; background: #ffffff; color: #000000; }
.info-row { display: flex; justify-content: space-between; align-items: center; }
.lbl-title { color: #666; font-size: 8px; font-weight: 900; letter-spacing: 0.5px; }

.timer {
    color: #00ff66;
    font-size: 12px;
    font-weight: bold;
    font-family: monospace;
    background: #000;
    padding: 2px 5px;
    border-radius: 4px;
}

.period-box {
    color: #000;
    font-size: 11px;
    font-weight: bold;
    font-family: monospace;
    background: #f2f5f3;
    padding: 4px;
    border-radius: 5px;
    border: 1px solid #ddd;
    text-align: center;
    margin-top: 2px;
}

.line { margin: 6px 0; border-bottom: 1.5px dashed #00ff66; }

.display-card {
    background: #000000;
    border: 1.5px solid #00ff66;
    border-radius: 6px;
    padding: 6px;
    text-align: center;
    margin-bottom: 6px;
}
.display-card p { font-size: 8px; color: #fff; font-weight: bold; margin-bottom: 2px; }

#bigsmall {
    font-size: 16px;
    font-weight: 900;
    color: #00ff66;
    text-shadow: 0 0 6px rgba(0, 255, 102, 0.6);
}

.image-wrapper {
    width: 48px;
    height: 48px;
    margin: 0 auto;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #000;
    border-radius: 6px;
}
#digitImg { width: 100%; height: 100%; object-fit: contain; display: none; }
#digitPlaceholder { font-size: 18px; font-weight: 900; color: #00ff66; }

.live {
    background: #000;
    padding: 5px 8px;
    color: #00ff66;
    font-size: 8px;
    font-weight: bold;
    border-top: 1px solid #111;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.dot {
    width: 5px;
    height: 5px;
    background: #00ff66;
    border-radius: 50%;
    box-shadow: 0 0 5px #00ff66;
    animation: blink 0.8s infinite alternate;
}

#floatingShortcutLogo {
    position: fixed;
    bottom: 25px;
    right: 25px;
    width: 55px;
    height: 55px;
    border: 2px solid #00ff66;
    border-radius: 50%;
    background: #000;
    z-index: 999999;
    cursor: pointer;
    display: none;
    overflow: hidden;
    box-shadow: 0 0 15px #00ff66;
}
#floatingShortcutLogo img { width: 100%; height: 100%; object-fit: cover; }

/* HIDE LOGIN PAGE COMPLETELY */
#loginPage { display: none !important; }
</style>
